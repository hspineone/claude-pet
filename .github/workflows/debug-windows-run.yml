name: Debug Windows Launch

# Windows 에서 ClaudePet 이 "Failed to launch JVM" 으로 죽는 원인을 진단.
# 지정한 릴리즈 태그의 MSI 를 runner 에 설치하고 실행한 뒤 stderr, install 로그,
# runtime 파일 목록, Application 이벤트 로그를 artifact 로 수집한다.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "태그 (예: v1.1.3)"
        required: true
        default: "v1.1.3"

jobs:
  diagnose:
    name: Install MSI and capture launch failure
    runs-on: windows-latest
    steps:
      - name: Download release zip
        shell: pwsh
        run: |
          $ver = "${{ inputs.version }}"
          $verNum = $ver.TrimStart('v')
          $url = "https://github.com/${{ github.repository }}/releases/download/$ver/ClaudePet-$verNum-windows.zip"
          Write-Host "Download: $url"
          Invoke-WebRequest -Uri $url -OutFile "release.zip"
          Expand-Archive -Path "release.zip" -DestinationPath "extracted" -Force
          $msi = Get-ChildItem -Path "extracted" -Recurse -Filter "*.msi" | Select-Object -First 1
          if (-not $msi) { throw "MSI not found in zip" }
          Write-Host "MSI path: $($msi.FullName)"
          "MSI_PATH=$($msi.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Install MSI silently
        shell: pwsh
        run: |
          $log = "$PWD\install.log"
          Write-Host "Installing $env:MSI_PATH"
          $p = Start-Process msiexec -ArgumentList "/i", "`"$env:MSI_PATH`"", "/qn", "/norestart", "/l*v", "`"$log`"" -Wait -PassThru
          Write-Host "msiexec exit code: $($p.ExitCode)"
          if ($p.ExitCode -ne 0) { Write-Host "---install.log (tail)---"; Get-Content $log -Tail 40 }

      - name: List installed runtime files
        shell: pwsh
        run: |
          $root = "C:\Program Files\ClaudePet"
          Write-Host "---top---"
          Get-ChildItem $root -Force | Format-Table -AutoSize | Out-String
          Write-Host "---runtime\bin---"
          Get-ChildItem "$root\runtime\bin" -Force | Format-Table -AutoSize | Out-String | Tee-Object -FilePath runtime-bin.txt
          Write-Host "---runtime\bin\server---"
          Get-ChildItem "$root\runtime\bin\server" -Force | Format-Table -AutoSize | Out-String

      - name: Dump ClaudePet.cfg
        shell: pwsh
        run: |
          $cfg = "C:\Program Files\ClaudePet\app\ClaudePet.cfg"
          if (Test-Path $cfg) { Get-Content $cfg | Tee-Object -FilePath claudepet.cfg }
          else { Write-Host "cfg not found: $cfg" }

      - name: Run ClaudePet.exe and capture output
        shell: pwsh
        continue-on-error: true
        run: |
          $exe = "C:\Program Files\ClaudePet\ClaudePet.exe"
          Write-Host "Launching $exe"
          $proc = Start-Process -FilePath $exe -RedirectStandardError "stderr.log" -RedirectStandardOutput "stdout.log" -PassThru
          Start-Sleep -Seconds 10
          if ($proc.HasExited) {
              Write-Host "EXITED with code: $($proc.ExitCode)"
              "exit_code=$($proc.ExitCode)" | Out-File -FilePath "process-result.txt"
          } else {
              Write-Host "still running, killing"
              $proc.Kill()
              "exit_code=still_running" | Out-File -FilePath "process-result.txt"
          }
          Write-Host "---stderr---"
          if (Test-Path stderr.log) { Get-Content stderr.log -Raw }
          Write-Host "---stdout---"
          if (Test-Path stdout.log) { Get-Content stdout.log -Raw }

      - name: Collect Application event log (last 10 min)
        shell: pwsh
        if: always()
        run: |
          $since = (Get-Date).AddMinutes(-10)
          try {
              $events = Get-WinEvent -FilterHashtable @{LogName='Application'; Level=1,2,3; StartTime=$since} -ErrorAction Stop |
                        Select-Object TimeCreated, LevelDisplayName, Id, ProviderName, @{n='MessageHead';e={$_.Message.Substring(0,[Math]::Min(500,$_.Message.Length))}}
              $events | Format-List | Tee-Object -FilePath app-events.txt
          } catch {
              Write-Host "Get-WinEvent failed or empty: $_"
              "no events or error: $_" | Out-File app-events.txt
          }

      - name: Run ClaudePet runtime java directly (should succeed if bundle is sane)
        shell: pwsh
        continue-on-error: true
        run: |
          # jpackage 는 java.exe 가 아니라 jli.dll 기반 ClaudePet.exe 로 부트. 참고용.
          $javaExe = "C:\Program Files\ClaudePet\runtime\bin\java.exe"
          if (Test-Path $javaExe) {
              Write-Host "java.exe exists, running -version"
              & $javaExe -version 2>&1 | Tee-Object -FilePath java-version.txt
          } else {
              Write-Host "java.exe NOT present (expected for jpackage)"
              "absent" | Out-File java-version.txt
          }

      - name: Upload diagnostic artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-debug-${{ inputs.version }}
          path: |
            install.log
            runtime-bin.txt
            claudepet.cfg
            stderr.log
            stdout.log
            process-result.txt
            app-events.txt
            java-version.txt
          if-no-files-found: warn
