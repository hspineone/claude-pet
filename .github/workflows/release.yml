name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    name: Build macOS (.dmg)
    runs-on: macos-14   # Apple Silicon
    steps:
      - uses: actions/checkout@v4

      # Temurin 21.0.10 은 mac arm64 에서 SIGTRAP 이슈가 있어 Zulu 21 을 사용.
      # JDK 21.0.11+ 이 배포되면 그에 맞게 재검토.
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      # 프로젝트 gradle.properties 의 `org.gradle.java.home` 은 로컬 개발자 경로(JBR)라
      # CI 에서는 제거해 setup-java 가 설정한 JAVA_HOME 을 사용하게 한다.
      - name: Strip local JDK pin from gradle.properties
        run: sed -i.bak '/^org\.gradle\.java\.home=/d' gradle.properties

      - name: Build macOS DMG
        run: ./gradlew :composeApp:packageDmg

      # DMG + 설치방법.txt 를 ClaudePet-<version>-macos.zip 으로 묶어 배포.
      - name: Bundle DMG + install guide as zip
        run: |
          set -euo pipefail
          DMG=$(ls dist/*.dmg | head -n 1)
          BASE=$(basename "$DMG" .dmg)          # ClaudePet-1.2.3
          VERSION="${BASE#ClaudePet-}"
          DIR="ClaudePet-${VERSION}-macos"
          mkdir -p "dist-zip/${DIR}"
          cp "$DMG" "dist-zip/${DIR}/"
          cp "docs/설치방법.txt" "dist-zip/${DIR}/"
          (cd dist-zip && zip -r "${DIR}.zip" "${DIR}")
          ls -lh dist-zip

      - uses: actions/upload-artifact@v4
        with:
          name: macos-zip
          path: dist-zip/*.zip
          if-no-files-found: error

  build-windows:
    name: Build Windows (.msi)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Windows 는 Temurin 21 사용. Zulu 21 Windows 빌드는 jpackage 로 번들 시
      # runtime\bin\java.exe 가 누락되는 사례가 관측됨(v1.1.0~v1.1.2). macOS 는
      # arm64 SIGTRAP 회피 위해 Zulu 유지.
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # Windows PowerShell 로 gradle.properties 의 로컬 JDK 라인 제거
      - name: Strip local JDK pin from gradle.properties
        shell: pwsh
        run: |
          (Get-Content gradle.properties) `
            | Where-Object { $_ -notmatch '^org\.gradle\.java\.home=' } `
            | Set-Content gradle.properties

      - name: Build Windows MSI
        shell: pwsh
        run: ./gradlew.bat :composeApp:packageMsi

      # MSI + 설치방법.txt 를 ClaudePet-<version>-windows.zip 으로 묶어 배포.
      # Compress-Archive 는 한글 엔트리 UTF-8 호환이 불안정해 7-Zip(러너 사전 설치) 사용.
      - name: Bundle MSI + install guide as zip
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $PSNativeCommandUseErrorActionPreference = $true   # 7z 등 native 명령 실패도 throw
          $msi = Get-ChildItem -LiteralPath 'dist' -Filter '*.msi' | Select-Object -First 1
          if (-not $msi) { throw "MSI not found under dist/" }
          $base = $msi.BaseName                                   # ClaudePet-1.2.3
          $version = $base.Substring('ClaudePet-'.Length)
          $dir = "ClaudePet-$version-windows"
          $stage = Join-Path 'dist-zip' $dir
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item -LiteralPath $msi.FullName -Destination $stage
          $guide = Join-Path 'docs' '설치방법.txt'
          Copy-Item -LiteralPath $guide -Destination $stage
          $sevenZip = 'C:\Program Files\7-Zip\7z.exe'
          if (-not (Test-Path -LiteralPath $sevenZip)) { throw "7-Zip not found at $sevenZip" }
          & $sevenZip a (Join-Path 'dist-zip' "$dir.zip") $stage | Out-Null
          Get-ChildItem -LiteralPath 'dist-zip'

      - uses: actions/upload-artifact@v4
        with:
          name: windows-zip
          path: dist-zip/*.zip
          if-no-files-found: error

  release:
    name: Publish Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # checkout 은 반드시 download-artifact / Move 보다 먼저 수행.
      # 기본 clean 옵션이 작업 디렉토리 전체를 삭제하므로, 나중에 두면
      # release-files/ 가 같이 날아가 릴리즈 자산이 0개로 발행된다.
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move artifacts to flat dir
        run: |
          mkdir -p release-files
          find artifacts -type f -name '*.zip' -exec mv {} release-files/ \;
          ls -lh release-files

      # release-please 가 CHANGELOG 로 본문을 채운 뒤, 공통 설치 안내를 append 한다.
      # (generate_release_notes 는 release-please 의 변경 로그와 중복되므로 사용하지 않음)
      - uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          append_body: true
          body_path: docs/release-install-footer.md
          draft: false
          prerelease: false
