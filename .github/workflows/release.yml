name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-macos:
    name: Build macOS (.dmg)
    runs-on: macos-14   # Apple Silicon
    steps:
      - uses: actions/checkout@v4

      # Temurin 21.0.10 은 mac arm64 에서 SIGTRAP 이슈가 있어 Zulu 21 을 사용.
      # JDK 21.0.11+ 이 배포되면 그에 맞게 재검토.
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      # 프로젝트 gradle.properties 의 `org.gradle.java.home` 은 로컬 개발자 경로(JBR)라
      # CI 에서는 제거해 setup-java 가 설정한 JAVA_HOME 을 사용하게 한다.
      - name: Strip local JDK pin from gradle.properties
        run: sed -i.bak '/^org\.gradle\.java\.home=/d' gradle.properties

      - name: Build macOS DMG
        run: ./gradlew :composeApp:packageDmg

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/*.dmg
          if-no-files-found: error

  build-windows:
    name: Build Windows (.msi)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      # Windows PowerShell 로 gradle.properties 의 로컬 JDK 라인 제거
      - name: Strip local JDK pin from gradle.properties
        shell: pwsh
        run: |
          (Get-Content gradle.properties) `
            | Where-Object { $_ -notmatch '^org\.gradle\.java\.home=' } `
            | Set-Content gradle.properties

      - name: Build Windows MSI
        shell: pwsh
        run: ./gradlew.bat :composeApp:packageMsi

      - uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: dist/*.msi
          if-no-files-found: error

  release:
    name: Publish Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move artifacts to flat dir
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name '*.dmg' -o -name '*.msi' \) -exec mv {} release-files/ \;
          ls -lh release-files

      - uses: actions/checkout@v4

      # release-please 가 CHANGELOG 로 본문을 채운 뒤, 공통 설치 안내를 append 한다.
      # (generate_release_notes 는 release-please 의 변경 로그와 중복되므로 사용하지 않음)
      - uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          append_body: true
          body_path: docs/release-install-footer.md
          draft: false
          prerelease: false
